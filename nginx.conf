# ═══════════════════════════════════════════════════════════════
# nginx.conf — Custom config for serving a Single-Page App
# ═══════════════════════════════════════════════════════════════
#
# React apps handle routing on the client side. When a user
# refreshes the page at /dashboard, the browser asks the server
# for /dashboard — but that file doesn't exist on the server.
#
# This config tells Nginx: "If you can't find the requested file,
# just serve index.html and let React handle the route."
#
# This is called the "try_files" fallback pattern.
# ═══════════════════════════════════════════════════════════════

server {
    listen       80;
    server_name  localhost;

    # Serve files from this directory
    root   /usr/share/nginx/html;
    index  index.html;

    location / {
        # Try to serve the requested file directly.
        # If it doesn't exist, fall back to index.html.
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets for better performance
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
